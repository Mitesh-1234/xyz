<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find My Booking - Ronak & Natasha</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #d4af37;
            --primary-dark: #b5952f;
            --secondary: #8b7355;
            --accent: #f5f5f5;
            --dark: #333;
            --light: #fff;
            --text-light: #666;
            --danger: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--accent);
            color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Hide scrollbar for IE, Edge and Firefox */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }

        h1,
        h2 {
            font-family: 'Playfair Display', serif;
        }

        .lookup-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo {
            color: var(--primary);
            font-size: 2rem;
            text-decoration: none;
            font-weight: 700;
            display: block;
            margin-bottom: 30px;
            font-family: 'Playfair Display', serif;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        button.btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button.btn-primary:hover {
            background: var(--primary-dark);
        }

        button.btn-back {
            background: transparent;
            color: var(--text-light);
            border: none;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: underline;
            font-family: inherit;
            font-size: 0.9rem;
        }

        /* Result Area */
        #itinerary {
            display: none;
            margin-top: 30px;
            text-align: left;
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 20px;
            background: #fffcf5;
        }

        .itinerary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 10px;
        }

        .itinerary-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .i-label {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .i-val {
            font-weight: 600;
            color: var(--dark);
        }

        @media (max-width: 480px) {
            .lookup-container {
                padding: 25px 20px;
                margin: 15px;
                width: calc(100% - 30px);
            }

            .logo {
                font-size: 1.2rem;
                margin-bottom: 20px;
            }

            h2 {
                font-size: 1.5rem;
            }

            .itinerary-row {
                flex-direction: column;
                gap: 5px;
            }

            .i-val {
                margin-top: 2px;
            }
        }
    </style>
</head>

<body>

    <div class="lookup-container">
        <a href="travel.html" class="logo">Ronak & Natasha</a>
        <h2 style="margin-bottom: 10px;">Find My Booking</h2>
        <p style="color: var(--text-light); margin-bottom: 30px; font-size: 0.9rem;">Enter the email used for booking
            and your unique reference number to locate your digital itinerary.</p>

        <form id="lookupForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="mitesh@example.com">
            </div>
            <div class="form-group">
                <label>Booking Reference</label>
                <input type="text" id="refId" required placeholder="RNXXXXXX">
            </div>
            <p id="errorMsg" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 15px; display: none;">
                Booking not found. Please check your details.</p>
            <button type="submit" class="btn-primary" id="searchBtn">Find Reservation</button>
            <button type="button" class="btn-back" onclick="window.location.href='travel.html'">Return to Travel
                Guide</button>
        </form>

        <div id="itinerary">
            <h3 style="color: var(--primary); margin-bottom: 15px; text-align: center;"><i
                    class="fas fa-ticket-alt"></i> Guest Itinerary</h3>
            <div class="itinerary-row"><span class="i-label">Guest Name</span><span class="i-val" id="iName"></span>
            </div>
            <div class="itinerary-row"><span class="i-label">Hotel</span><span class="i-val" id="iHotel"></span></div>
            <div class="itinerary-row"><span class="i-label">Room Type</span><span class="i-val" id="iRoom"></span>
            </div>
            <div class="itinerary-row"><span class="i-label">Check In</span><span class="i-val" id="iIn"></span></div>
            <div class="itinerary-row"><span class="i-label">Check Out</span><span class="i-val" id="iOut"></span></div>
            <div class="itinerary-row"><span class="i-label">Amount Paid</span><span class="i-val" id="iPaid"></span>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button type="button" class="btn-primary" onclick="setTimeout(() => window.print(), 300)"
                    style="padding: 10px; font-size: 1rem;"><i class="fas fa-print"></i> Print Receipt</button>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOnd3gp0fSkRBlBBg04FDwOn-a1IVwj0g",
            authDomain: "ronak-s-wedding.firebaseapp.com",
            projectId: "ronak-s-wedding",
            storageBucket: "ronak-s-wedding.firebasestorage.app",
            messagingSenderId: "902091649633",
            appId: "1:902091649633:web:d4acc3d736d4174ddff020"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('lookupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const refId = document.getElementById('refId').value.trim().toUpperCase();
            const searchBtn = document.getElementById('searchBtn');
            const errorMsg = document.getElementById('errorMsg');
            const itinerary = document.getElementById('itinerary');

            searchBtn.innerText = "Searching...";
            searchBtn.disabled = true;
            errorMsg.style.display = 'none';
            itinerary.style.display = 'none';

            try {
                const q = query(collection(db, "hotelBookings"), where("email", "==", email), where("reference", "==", refId));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    errorMsg.style.display = 'block';
                } else {
                    // Match found
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        document.getElementById('iName').innerText = data.guestName;
                        document.getElementById('iHotel').innerText = data.hotel;
                        document.getElementById('iRoom').innerText = data.room;
                        document.getElementById('iIn').innerText = data.checkin;
                        document.getElementById('iOut').innerText = data.checkout;
                        document.getElementById('iPaid').innerText = data.totalPaid;
                    });
                    itinerary.style.display = 'block';
                    // Hide form inputs for a cleaner printed receipt
                    document.getElementById('email').parentNode.style.display = 'none';
                    document.getElementById('refId').parentNode.style.display = 'none';
                    searchBtn.style.display = 'none';
                }
            } catch (error) {
                console.error("Error fetching booking:", error);
                alert("Something went wrong connecting to the database.");
            }

            searchBtn.innerText = "Find Reservation";
            searchBtn.disabled = false;
        });
    </script>
</body>

</html>
